<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>DOM</title>
    <style>
        body {
            background-color: lightseagreen;
            color: white;
            font-family: Arial, Helvetica, sans-serif;
        }
    </style>
</head>
<body>
    <h1>Aula DOM</h1>
    <p>Resultado: </p>
    <p>Iniciando as aulas com <strong>DOM</strong>.</p>
    <div id="click">
        click em mim
    </div>
    <script>
        var p1 = window.document.getElementsByTagName('p')[0];
         window.document.write('Ola,' + p1.innerText);
         p1.style.color = 'red';
         var cli = window.document.getElementById('click');
         cli.style.color = 'blue';
         cli.style.cursor = 'pointer';
         cli.style.background = 'white';
         cli.innerText = 'Clicou em mim!!!';
    </script>
</body>
</html>
