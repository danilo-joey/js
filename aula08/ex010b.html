<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Nacionalidade</title>
</head>
<body>
    <h1>Nacionalidade</h1>
    <p>Diga seu pais:</p>
    <input type="text" id="pais" placeholder="Seu pais">
    <input type="button" value="Verificar" onclick="verificar()">
    <div id="res">

    </div>
    <script>
        var pai = document.getElementById('pais')
        var res = document.getElementById('res')
        function verificar() {
            if (pai.value == 'Brasil'){
                res.innerHTML = 'brasileiro'
            } else {
                res.innerHTML = 'não é brasileiro'
            }
            
        }
    </script>
</body>
</html>
