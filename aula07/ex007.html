<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Dom</title>
</head>
<body>
    <h1>Soma</h1>
    <input type="number" name="n1" id="n1"> +
    <input type="number" name="n2" id="n2">
    <input type="button" value="Somar" onclick="soma()">
    <p id="res">Resultado: </p>


    <script>
        function soma() {
            var n1 = window.document.getElementById('n1')
            var n2 = window.document.getElementById('n2')
            var res = window.document.getElementById('res')
            var n11 = Number(n1.value)
            var n22 = Number(n2.value)
            var s = n11 + n22
            res.innerText = `A soma entre ${n11} e ${n22} é ${s}`
        }
    </script>
</body>
</html>
